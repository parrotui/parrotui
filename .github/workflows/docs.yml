name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build VitePress docs
        run: |
          echo "Node: $(node -v) | npm: $(npm -v)"
          echo "CPU: $(nproc) cores | RAM: $(free -h | awk '/Mem:/{print $2}')"
          echo "MD files: $(find docs -name '*.md' | wc -l)"
          echo "--- Build start: $(date -u) ---"
          
          # 后台监控进程：每30秒输出系统状态，防止GitHub Actions因无输出而超时
          (while true; do
            sleep 30
            echo "[watchdog $(date -u)] CPU: $(top -bn1 | head -3 | tail -1) | MEM: $(free -m | awk '/Mem:/{printf \"%d/%dMB\", $3, $2}')"
            echo "[watchdog] Top processes: $(ps aux --sort=-%cpu | head -4 | tail -3 | awk '{printf \"%s(%s%% CPU) \", $11, $3}')"
          done) &
          WATCHDOG_PID=$!
          
          # 限制构建最多5分钟，本地14秒足够
          timeout 300 ./node_modules/.bin/vitepress build docs || {
            EXIT_CODE=$?
            echo "::error::VitePress build failed or timed out (exit=$EXIT_CODE)"
            echo "--- Process tree at failure ---"
            ps auxf | head -40
            echo "--- Node processes ---"
            ps aux | grep -i node
            kill $WATCHDOG_PID 2>/dev/null
            exit 1
          }
          
          kill $WATCHDOG_PID 2>/dev/null
          echo "--- Build done: $(date -u) ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
