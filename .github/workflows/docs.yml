name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build VitePress docs
        run: |
          echo "::group::Build Info"
          echo "Node: $(node -v) | npm: $(npm -v)"
          echo "VitePress: $(npx vitepress --version 2>/dev/null || echo 'unknown')"
          echo "Pages count: $(find docs -name '*.md' | wc -l)"
          echo "::endgroup::"
          echo "--- Build starting at $(date -u) ---"
          npm run docs:build 2>&1
          echo "--- Build finished at $(date -u) ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
