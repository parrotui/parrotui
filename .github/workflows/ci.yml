name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      # 仅检查 docs 和 ts 配置文件，排除 packages（含 .uvue / uni 语法）
      - name: Type check docs only
        run: npx tsc --noEmit --skipLibCheck -p tsconfig.docs.json || true
